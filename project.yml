name: Siturem
options:
  bundleIdPrefix: com.beabot
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: ""
    DEVELOPMENT_LANGUAGE: fr
    PRODUCT_BUNDLE_IDENTIFIER: fr.beabot.siturem

targets:
  Siturem:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Siturem
        excludes:
          - Audio/**
      - path: Siturem/Audio
        type: folder
        buildPhase: resources
    entitlements:
      path: Siturem/Siturem.entitlements
      properties:
        com.apple.developer.healthkit: true
    info:
      path: Siturem/Info.plist
      properties:
        CFBundleName: Siturem
        CFBundleDisplayName: Siturem
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSHealthShareUsageDescription: "Siturem enregistre vos séances de méditation dans l'app Santé."
        NSHealthUpdateUsageDescription: "Siturem enregistre vos séances de méditation dans l'app Santé."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.beabot.siturem
        INFOPLIST_FILE: Siturem/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies: []

schemes:
  Siturem:
    shared: true
    build:
      targets:
        Siturem: all
    run:
      config: Debug
    archive:
      config: Release
